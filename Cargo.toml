[package]
name = "oxideav-avif"
version = "0.0.3"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/OxideAV/oxideav-avif"
authors = ["Mark Karpeles"]
description = "Pure-Rust AVIF (AV1 Image File Format) codec — scaffold (decoder + encoder not yet implemented)"

readme = "README.md"
homepage = "https://github.com/OxideAV/oxideav-avif"
keywords = ["multimedia", "image", "avif", "av1", "codec"]
categories = ["multimedia::encoding", "multimedia::images"]

[dependencies]
oxideav-core = "0.0"
oxideav-codec = "0.0"
